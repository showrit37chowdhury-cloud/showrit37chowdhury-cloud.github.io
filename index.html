<!DOCTYPE html>
<html lang="en">
<head>
    <title>SHOWRIT | Official Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Base Reset */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden; /* Prevents scrollbars while sliding */
        }

        /* Container for the 5 Pages */
        .page-wrapper {
            display: flex;
            width: 500%; /* 5 pages at 100% each */
            height: 100vh;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Individual Page Styling */
        .page {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* ADD YOUR BACKGROUND IMAGES HERE */
        #page1 { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('your-image1.jpg'); }
        #page2 { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('your-image2.jpg'); }
        #page3 { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('your-image3.jpg'); }
        #page4 { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('your-image4.jpg'); }
        #page5 { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('your-image5.jpg'); }

        .page-content {
            max-width: 800px;
            padding: 20px;
            color: #FFA500; /* Your preferred orange */
        }

        /* Navigation Interface (Based on your image) */
        .nav-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 240, 0.9); /* Creamy background from image */
            padding: 10px 20px;
            border-radius: 50px;
            z-index: 1000;
        }

        .nav-btn {
            background-color: #d8c3a5; /* Muted tan */
            border: 2px solid #ccc;
            padding: 8px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: #1a3c34; /* Dark green text from image */
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .nav-btn:hover { background-color: #cbb698; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .page-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 20px;
            color: #333;
        }

        .current-num {
            background: #f8e1c1;
            padding: 5px 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .total-num {
            background: #ccc;
            padding: 5px 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="page-wrapper" id="wrapper">
        <section class="page" id="page1">
            <div class="page-content">
                <h1>SHOWRIT</h1>
                <p>Tech Enthusiast | Creator | Developer</p>
            </div>
        </section>

        <section class="page" id="page2">
            <div class="page-content">
                <h2>Projects</h2>
                <p>Check out what I've been building lately.</p>
            </div>
        </section>

        <section class="page" id="page3">
            <div class="page-content">
                <h2>Skills</h2>
                <p>HTML, CSS, SEO, and GitHub Management.</p>
            </div>
        </section>

        <section class="page" id="page4">
            <div class="page-content">
                <h2>Journey</h2>
                <p>Launched my first site in 2026.</p>
            </div>
        </section>

        <section class="page" id="page5">
            <div class="page-content">
                <h2>Contact</h2>
                <p>Let's collaborate on the next big thing.</p>
            </div>
        </section>
    </div>

    <div class="nav-container">
        <button class="nav-btn" id="prevBtn" onclick="changePage(-1)">◀ Prev</button>
        <div class="page-indicator">
            <span class="current-num" id="currentNum">1</span>
            <span>/</span>
            <span class="total-num">5</span>
        </div>
        <button class="nav-btn" id="nextBtn" onclick="changePage(1)">Next ▶</button>
    </div>

    <script>
        let currentPage = 1;
        const totalPages = 5;
        const wrapper = document.getElementById('wrapper');
        const currentNumDisplay = document.getElementById('currentNum');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function changePage(direction) {
            currentPage += direction;

            // Constrain page numbers
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            // Move the wrapper
            const offset = (currentPage - 1) * -100;
            wrapper.style.transform = `translateX(${offset}vw)`;

            // Update UI
            currentNumDisplay.innerText = currentPage;
            
            // Disable buttons at ends
            prevBtn.disabled = (currentPage === 1);
            nextBtn.disabled = (currentPage === totalPages);
        }

        // Initialize button state
        prevBtn.disabled = true;
    </script>
</body>
</html>
